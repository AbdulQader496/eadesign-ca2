apiVersion: v1
kind: Secret
metadata:
  name: backend-env
  namespace: eadesign-ca2
type: Opaque
stringData:
  DATABASE_URL: mongodb://mongodb:27017
  DATABASE_NAME: ead_ca2
  DATABASE_COLLECTION: ead_2024
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: eadesign-ca2
  labels:
    app: backend
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /actuator/prometheus
    spec:
      volumes:
        - name: backend-tmp
          emptyDir: {}
      containers:
        - name: backend
          image: __BACKEND_IMAGE__
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: DATABASE_URL
            - name: DATABASE_NAME
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: DATABASE_NAME
            - name: DATABASE_COLLECTION
              valueFrom:
                secretKeyRef:
                  name: backend-env
                  key: DATABASE_COLLECTION
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: backend-tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: eadesign-ca2
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: /actuator/prometheus
spec:
  type: ClusterIP
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
