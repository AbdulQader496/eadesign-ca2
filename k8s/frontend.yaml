apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: eadesign-ca2
  labels:
    app: frontend
spec:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "22137"
        prometheus.io/path: /metrics
    spec:
      volumes:
        - name: frontend-tmp
          emptyDir: {}
      containers:
        - name: frontend
          image: __FRONTEND_IMAGE__
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
          ports:
            - containerPort: 22137
          volumeMounts:
            - name: frontend-tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /
              port: 22137
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 22137
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: eadesign-ca2
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "22137"
    prometheus.io/path: /metrics
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 22137
