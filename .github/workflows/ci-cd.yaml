name: CI/CD Pipeline

on:
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Run Backend Tests
        working-directory: BACK_END
        run: mvn -B test

      - name: Upload Backend Test Results
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: BACK_END/target
          if-no-files-found: ignore

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Frontend Dependencies
        working-directory: FRONT_END
        run: npm ci

      - name: Run Frontend Tests
        working-directory: FRONT_END
        run: npm test

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Frontend Dependencies
        working-directory: FRONT_END
        run: npm ci

      - name: Build Backend
        working-directory: BACK_END
        run: mvn -B test

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

  backend-build:
    name: Build Backend Artifact
    runs-on: ubuntu-latest
    needs:
      - backend-tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Backend Artifact
        working-directory: BACK_END
        run: mvn -B package --file pom.xml

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: BACK_END/target/*.jar

  docker-images:
    name: Build And Push Docker Images
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-tests
      - sonarcloud

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: BACK_END/target
          
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "ca2-project"
          path: "."
          format: "HTML"
          out: "dependency-check-report"
    
      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build Frontend Image
        working-directory: FRONT_END
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-frontend:${{ env.IMAGE_TAG }} .

      - name: Build Backend Image
        working-directory: BACK_END
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-backend:${{ env.IMAGE_TAG }} .

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-backend:${{ env.IMAGE_TAG }}"

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-frontend:${{ env.IMAGE_TAG }}

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-backend:${{ env.IMAGE_TAG }}

  deploy:
    name: Deploy To AKS
    runs-on: ubuntu-latest
    needs:
      - docker-images

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set Kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Deploy To AKS With Terraform
        working-directory: terraform
        run: |
          terraform init
          terraform import kubernetes_namespace_v1.ca2 eadesign-ca2 || true
          terraform import kubernetes_persistent_volume_claim_v1.mongodb_data eadesign-ca2/mongodb-data || true
          terraform import kubernetes_secret_v1.backend_env eadesign-ca2/backend-env || true
          terraform import kubernetes_deployment.mongodb eadesign-ca2/mongodb || true
          terraform import kubernetes_service.mongodb eadesign-ca2/mongodb || true
          terraform import kubernetes_deployment.backend eadesign-ca2/backend || true
          terraform import kubernetes_service.backend eadesign-ca2/backend || true
          terraform import kubernetes_horizontal_pod_autoscaler_v2.backend eadesign-ca2/backend-hpa || true
          terraform import kubernetes_deployment.frontend eadesign-ca2/frontend || true
          terraform import kubernetes_service.frontend eadesign-ca2/frontend || true
          terraform import kubernetes_horizontal_pod_autoscaler_v2.frontend eadesign-ca2/frontend-hpa || true
          terraform import kubernetes_ingress_v1.ca2_ingress eadesign-ca2/ca2-ingress || true
          terraform apply -auto-approve \
            -var="backend_image=${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-backend:${{ env.IMAGE_TAG }}" \
            -var="frontend_image=${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-frontend:${{ env.IMAGE_TAG }}"
