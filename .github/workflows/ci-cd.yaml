name: CI/CD Pipeline

on:
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Run Backend Tests
        working-directory: BACK_END
        run: mvn -B test

      - name: Upload Backend Test Results
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: BACK_END/target
          if-no-files-found: ignore

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Frontend Dependencies
        working-directory: FRONT_END
        run: npm ci

      - name: Run Frontend Tests
        working-directory: FRONT_END
        run: npm test

      - name: Run NPM Audit
        working-directory: FRONT_END
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Export NPM Audit Report
        working-directory: FRONT_END
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload NPM Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: FRONT_END/npm-audit-report.json

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Frontend Dependencies
        working-directory: FRONT_END
        run: npm ci

      - name: Build Backend
        working-directory: BACK_END
        run: mvn -B test

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

  backend-build:
    name: Build Backend Artifact
    runs-on: ubuntu-latest
    needs:
      - backend-tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Backend Artifact
        working-directory: BACK_END
        run: mvn -B package --file pom.xml

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: BACK_END/target/*.jar

  docker-images:
    name: Build And Push Docker Images
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-tests
      - sonarcloud

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: BACK_END/target

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Frontend Dependencies
        working-directory: FRONT_END
        run: npm ci
          
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "ca2-project"
          path: "."
          format: "HTML"
          out: "dependency-check-report"
          args: "--disableCentral"
    
      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build Frontend Image
        working-directory: FRONT_END
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-frontend:${{ env.IMAGE_TAG }} .

      - name: Build Backend Image
        working-directory: BACK_END
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-backend:${{ env.IMAGE_TAG }} .

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | \
            sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy Scan (Both Images)
        run: |
          trivy image --format table -o trivy-backend-report.txt ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-backend:${{ env.IMAGE_TAG }}
          trivy image --format table -o trivy-frontend-report.txt ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-frontend:${{ env.IMAGE_TAG }}

      - name: Upload Trivy Reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-backend-report.txt
            trivy-frontend-report.txt
            
      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-frontend:${{ env.IMAGE_TAG }}

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-backend:${{ env.IMAGE_TAG }}
 
  deploy:
    name: Deploy To AKS
    runs-on: ubuntu-latest
    needs:
      - docker-images

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set Kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Deploy To AKS With Terraform
        working-directory: terraform
        run: |
          terraform init
          terraform import kubernetes_namespace_v1.ca2 eadesign-ca2 || true
          terraform import kubernetes_persistent_volume_claim_v1.mongodb_data eadesign-ca2/mongodb-data || true
          terraform import kubernetes_persistent_volume_claim_v1.mongodb_backup eadesign-ca2/mongodb-backup || true
          terraform import kubernetes_secret_v1.backend_env eadesign-ca2/backend-env || true
          terraform import kubernetes_deployment.mongodb eadesign-ca2/mongodb || true
          terraform import kubernetes_service.mongodb eadesign-ca2/mongodb || true
          terraform import kubernetes_cron_job_v1.mongodb_backup eadesign-ca2/mongodb-backup || true
          terraform import kubernetes_network_policy.mongodb_policy eadesign-ca2/mongodb-allow-backend-only || true
          terraform import kubernetes_deployment.backend eadesign-ca2/backend || true
          terraform import kubernetes_service.backend eadesign-ca2/backend || true
          terraform import kubernetes_network_policy.backend_policy eadesign-ca2/backend-allow-frontend-monitoring-and-ingress || true
          terraform import kubernetes_network_policy.backend_egress_policy eadesign-ca2/backend-egress-db-and-dns || true
          terraform import kubernetes_horizontal_pod_autoscaler_v2.backend eadesign-ca2/backend-hpa || true
          terraform import kubernetes_deployment.frontend eadesign-ca2/frontend || true
          terraform import kubernetes_service.frontend eadesign-ca2/frontend || true
          terraform import kubernetes_network_policy.frontend_policy eadesign-ca2/frontend-allow-ingress-and-monitoring || true
          terraform import kubernetes_network_policy.frontend_egress_policy eadesign-ca2/frontend-egress-backend-and-dns || true
          terraform import kubernetes_horizontal_pod_autoscaler_v2.frontend eadesign-ca2/frontend-hpa || true
          terraform import kubernetes_ingress_v1.ca2_ingress eadesign-ca2/ca2-ingress || true
          terraform apply -auto-approve \
            -var="backend_image=${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-backend:${{ env.IMAGE_TAG }}" \
            -var="frontend_image=${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-frontend:${{ env.IMAGE_TAG }}"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Verify MongoDB Rollout
        run: |
          kubectl rollout status deployment/mongodb -n eadesign-ca2 --timeout=120s || \
          (echo "MongoDB rollout failed, rolling back..." && \
          kubectl rollout undo deployment/mongodb -n eadesign-ca2 && exit 1)

      - name: Verify Backend Rollout
        run: |
          kubectl rollout status deployment/backend -n eadesign-ca2 --timeout=120s || \
          (echo "Backend rollout failed, rolling back..." && \
          kubectl rollout undo deployment/backend -n eadesign-ca2 && exit 1)

      - name: Verify Frontend Rollout
        run: |
          kubectl rollout status deployment/frontend -n eadesign-ca2 --timeout=120s || \
          (echo "Frontend rollout failed, rolling back..." && \
          kubectl rollout undo deployment/frontend -n eadesign-ca2 && exit 1)

      - name: Check All Pods
        run: kubectl get pods -n eadesign-ca2 -o wide

      - name: Backend Logs
        run: kubectl logs -l app=backend -n eadesign-ca2 --tail=30

      - name: Frontend Logs
        run: kubectl logs -l app=frontend -n eadesign-ca2 --tail=30

  monitoring:
    name: Install Monitoring And Logging
    runs-on: ubuntu-latest
    needs:
      - deploy
    steps:
      - name: Set Kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > "$HOME/.kube/config"

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Add Helm Repos
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Install Prometheus And Grafana
        run: |
          helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
            --namespace eadesign-ca2 \
            --set grafana.adminPassword=${{ secrets.GRAFANA_PASSWORD }} \
            --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
            --set prometheus.prometheusSpec.podMonitorSelectorNilUsesHelmValues=false \
            --set grafana.sidecar.datasources.enabled=true

      - name: Install Loki Stack
        run: |
          helm upgrade --install loki grafana/loki-stack \
            --namespace eadesign-ca2 \
            --set grafana.enabled=false \
            --set loki.enabled=true \
            --set promtail.enabled=true \
            --set test_pod.enabled=false

      - name: Normalize Grafana Datasources
        run: |
          for resource in $(kubectl get configmap -n eadesign-ca2 -l grafana_datasource -o name); do
            if [ "$resource" != "configmap/monitoring-kube-prometheus-grafana-datasource" ]; then
              kubectl delete "$resource" -n eadesign-ca2
            fi
          done

          for resource in $(kubectl get secret -n eadesign-ca2 -l grafana_datasource -o name); do
            kubectl delete "$resource" -n eadesign-ca2
          done

          cat <<'EOF' | kubectl apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: monitoring-kube-prometheus-grafana-datasource
            namespace: eadesign-ca2
            labels:
              grafana_datasource: "1"
              app: kube-prometheus-stack-grafana
              app.kubernetes.io/component: grafana
              app.kubernetes.io/instance: monitoring
              app.kubernetes.io/name: kube-prometheus-stack-grafana
          data:
            datasource.yaml: |-
              apiVersion: 1
              datasources:
                - name: Prometheus
                  type: prometheus
                  uid: prometheus
                  access: proxy
                  url: http://monitoring-kube-prometheus-prometheus.eadesign-ca2:9090/
                  isDefault: true
                  jsonData:
                    httpMethod: POST
                    timeInterval: 30s
                - name: Loki
                  type: loki
                  uid: loki
                  access: proxy
                  url: http://loki.eadesign-ca2:3100
                  isDefault: false
                  jsonData:
                    maxLines: 1000
          EOF

      - name: Restart Grafana
        run: |
          kubectl rollout restart deployment/monitoring-grafana -n eadesign-ca2
          kubectl rollout status deployment/monitoring-grafana -n eadesign-ca2 --timeout=180s

      - name: Apply PodMonitors
        run: |
          cat <<'EOF' | kubectl apply -f -
          apiVersion: monitoring.coreos.com/v1
          kind: PodMonitor
          metadata:
            name: backend-podmonitor
            namespace: eadesign-ca2
            labels:
              release: monitoring
          spec:
            namespaceSelector:
              matchNames:
                - eadesign-ca2
            selector:
              matchLabels:
                app: backend
            podMetricsEndpoints:
              - path: /actuator/prometheus
                targetPort: 8080
                interval: 30s
          ---
          apiVersion: monitoring.coreos.com/v1
          kind: PodMonitor
          metadata:
            name: frontend-podmonitor
            namespace: eadesign-ca2
            labels:
              release: monitoring
          spec:
            namespaceSelector:
              matchNames:
                - eadesign-ca2
            selector:
              matchLabels:
                app: frontend
            podMetricsEndpoints:
              - path: /metrics
                targetPort: 22137
                interval: 30s
          EOF

      - name: Verify Monitoring Pods
        run: kubectl get pods -n eadesign-ca2 -l "release=monitoring"

      - name: Verify Loki Pods
        run: kubectl get pods -n eadesign-ca2 -l "release=loki"

      - name: Show Access Info
        run: |
          echo "===== MONITORING ACCESS ====="
          echo "Grafana (metrics + logs): kubectl port-forward svc/monitoring-grafana 3000:80 -n eadesign-ca2"
          echo "Prometheus:               kubectl port-forward svc/monitoring-kube-prometheus-prometheus 9090:9090 -n eadesign-ca2"
          echo "============================="
