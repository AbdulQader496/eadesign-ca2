name: CI/CD Pipeline

on:
  workflow_dispatch:

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs:
      - gitleaks

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Run Backend Tests
        working-directory: BACK_END
        run: mvn -B test

      - name: Upload Backend Test Results
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: BACK_END/target
          if-no-files-found: ignore

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs:
      - gitleaks

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Frontend Dependencies
        working-directory: FRONT_END
        run: npm ci

      - name: Run Frontend Tests
        working-directory: FRONT_END
        run: npm test

      - name: Run NPM Audit
        working-directory: FRONT_END
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Export NPM Audit Report
        working-directory: FRONT_END
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload NPM Audit Report
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: FRONT_END/npm-audit-report.json

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs:
      - backend-tests
      - frontend-tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Frontend Dependencies
        working-directory: FRONT_END
        run: npm ci

      - name: Build Backend
        working-directory: BACK_END
        run: mvn -B test

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
          SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}

  backend-build:
    name: Build Backend Artifact
    runs-on: ubuntu-latest
    needs:
      - backend-tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build Backend Artifact
        working-directory: BACK_END
        run: mvn -B package --file pom.xml

      - name: Upload Backend Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: BACK_END/target/*.jar

  docker-images:
    name: Build And Push Docker Images
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-tests
      - sonarcloud

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: BACK_END/target

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Frontend Dependencies
        working-directory: FRONT_END
        run: npm ci
          
      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "ca2-project"
          path: "."
          format: "HTML"
          out: "dependency-check-report"
          args: "--disableCentral"
    
      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Build Frontend Image
        working-directory: FRONT_END
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-frontend:${{ env.IMAGE_TAG }} .

      - name: Build Backend Image
        working-directory: BACK_END
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-backend:${{ env.IMAGE_TAG }} .

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
            gpg --dearmor | \
            sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
            sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy Scan (Both Images)
        run: |
          trivy image --format table -o trivy-backend-report.txt ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-backend:${{ env.IMAGE_TAG }}
          trivy image --format table -o trivy-frontend-report.txt ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-frontend:${{ env.IMAGE_TAG }}

      - name: Upload Trivy Reports
        uses: actions/upload-artifact@v4
        with:
          name: trivy-reports
          path: |
            trivy-backend-report.txt
            trivy-frontend-report.txt
            
      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-frontend:${{ env.IMAGE_TAG }}

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-backend:${{ env.IMAGE_TAG }}
 
  deploy:
    name: Deploy To AKS
    runs-on: ubuntu-latest
    needs:
      - docker-images

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Deploy To AKS With Terraform
        working-directory: terraform
        env:
          TF_VAR_azure_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_resource_group_name: ${{ vars.AZURE_RESOURCE_GROUP || 'eadesign-ca2-rg' }}
          TF_VAR_aks_cluster_name: ${{ vars.AKS_CLUSTER_NAME || 'eadesign-ca2-aks' }}
          TF_VAR_aks_dns_prefix: ${{ vars.AKS_DNS_PREFIX || 'eadesign-ca2' }}
          TF_VAR_azure_location: ${{ vars.AZURE_LOCATION || 'uksouth' }}
          TF_VAR_aks_node_count: ${{ vars.AKS_NODE_COUNT || '2' }}
          TF_VAR_aks_node_vm_size: ${{ vars.AKS_NODE_VM_SIZE || 'Standard_B2s' }}
          TF_VAR_aks_os_disk_size_gb: ${{ vars.AKS_OS_DISK_SIZE_GB || '64' }}
          TF_VAR_aks_kubernetes_version: ${{ vars.AKS_KUBERNETES_VERSION || '' }}
        run: |
          terraform init
          : > generated-imports.tf
          if az group exists --name "$TF_VAR_resource_group_name" | grep -q true; then
            cat <<EOF >> generated-imports.tf
import {
  to = azurerm_resource_group.ca2
  id = "/subscriptions/$TF_VAR_azure_subscription_id/resourceGroups/$TF_VAR_resource_group_name"
}

EOF
          fi
          if az aks show --resource-group "$TF_VAR_resource_group_name" --name "$TF_VAR_aks_cluster_name" >/dev/null 2>&1; then
            cat <<EOF >> generated-imports.tf
import {
  to = azurerm_kubernetes_cluster.ca2
  id = "/subscriptions/$TF_VAR_azure_subscription_id/resourceGroups/$TF_VAR_resource_group_name/providers/Microsoft.ContainerService/managedClusters/$TF_VAR_aks_cluster_name"
}

EOF
          fi
          terraform apply -auto-approve

      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.AZURE_RESOURCE_GROUP || 'eadesign-ca2-rg' }}
          cluster-name: ${{ vars.AKS_CLUSTER_NAME || 'eadesign-ca2-aks' }}

      - name: Ensure Namespace Exists
        run: kubectl create namespace eadesign-ca2 --dry-run=client -o yaml | kubectl apply -f -

      - name: Render Kubernetes Manifests
        env:
          BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-backend:${{ env.IMAGE_TAG }}
          FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/eadesign-ca2-frontend:${{ env.IMAGE_TAG }}
        run: |
          mkdir -p rendered-k8s
          cp k8s/*.yaml rendered-k8s/
          sed -i "s|__BACKEND_IMAGE__|${BACKEND_IMAGE}|g" rendered-k8s/backend.yaml
          sed -i "s|__FRONTEND_IMAGE__|${FRONTEND_IMAGE}|g" rendered-k8s/frontend.yaml

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f rendered-k8s/mongodb.yaml
          kubectl apply -f rendered-k8s/backend.yaml
          kubectl apply -f rendered-k8s/frontend.yaml
          kubectl apply -f rendered-k8s/ops.yaml
          kubectl apply -f rendered-k8s/network-policies.yaml
          kubectl apply -f rendered-k8s/ingress.yaml

      - name: Verify MongoDB Rollout
        run: |
          if ! kubectl rollout status deployment/mongodb -n eadesign-ca2 --timeout=120s; then
            echo "MongoDB rollout failed. Collecting diagnostics..."
            kubectl get pods -n eadesign-ca2 -o wide || true
            kubectl describe deployment/mongodb -n eadesign-ca2 || true
            kubectl describe pods -l app=mongodb -n eadesign-ca2 || true
            kubectl logs -l app=mongodb -n eadesign-ca2 --tail=100 || true
            kubectl logs -l app=mongodb -n eadesign-ca2 --previous --tail=100 || true
            if kubectl rollout history deployment/mongodb -n eadesign-ca2 | awk 'NR>2 {found=1} END {exit found ? 0 : 1}'; then
              echo "Rolling back MongoDB deployment..."
              kubectl rollout undo deployment/mongodb -n eadesign-ca2 || true
            else
              echo "Skipping rollback for MongoDB: no previous rollout revision exists."
            fi
            exit 1
          fi

      - name: Verify Backend Rollout
        run: |
          if ! kubectl rollout status deployment/backend -n eadesign-ca2 --timeout=120s; then
            echo "Backend rollout failed. Collecting diagnostics..."
            kubectl get pods -n eadesign-ca2 -o wide || true
            kubectl describe deployment/backend -n eadesign-ca2 || true
            kubectl describe pods -l app=backend -n eadesign-ca2 || true
            kubectl logs -l app=backend -n eadesign-ca2 --tail=100 || true
            kubectl logs -l app=backend -n eadesign-ca2 --previous --tail=100 || true
            kubectl get events -n eadesign-ca2 --sort-by=.lastTimestamp | tail -n 30 || true
            if kubectl rollout history deployment/backend -n eadesign-ca2 | awk 'NR>2 {found=1} END {exit found ? 0 : 1}'; then
              echo "Rolling back backend deployment..."
              kubectl rollout undo deployment/backend -n eadesign-ca2 || true
            else
              echo "Skipping rollback for backend: no previous rollout revision exists."
            fi
            exit 1
          fi

      - name: Verify Frontend Rollout
        run: |
          if ! kubectl rollout status deployment/frontend -n eadesign-ca2 --timeout=120s; then
            echo "Frontend rollout failed. Collecting diagnostics..."
            kubectl get pods -n eadesign-ca2 -o wide || true
            kubectl describe deployment/frontend -n eadesign-ca2 || true
            kubectl describe pods -l app=frontend -n eadesign-ca2 || true
            kubectl logs -l app=frontend -n eadesign-ca2 --tail=100 || true
            kubectl logs -l app=frontend -n eadesign-ca2 --previous --tail=100 || true
            kubectl get events -n eadesign-ca2 --sort-by=.lastTimestamp | tail -n 30 || true
            if kubectl rollout history deployment/frontend -n eadesign-ca2 | awk 'NR>2 {found=1} END {exit found ? 0 : 1}'; then
              echo "Rolling back frontend deployment..."
              kubectl rollout undo deployment/frontend -n eadesign-ca2 || true
            else
              echo "Skipping rollback for frontend: no previous rollout revision exists."
            fi
            exit 1
          fi

      - name: Check All Pods
        if: success()
        run: kubectl get pods -n eadesign-ca2 -o wide

      - name: Backend Logs
        if: success()
        run: kubectl logs -l app=backend -n eadesign-ca2 --tail=30

      - name: Frontend Logs
        if: success()
        run: kubectl logs -l app=frontend -n eadesign-ca2 --tail=30

  monitoring:
    name: Install Monitoring And Logging
    runs-on: ubuntu-latest
    needs:
      - deploy
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up Helm
        uses: azure/setup-helm@v3

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Set AKS Context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ vars.AZURE_RESOURCE_GROUP || 'eadesign-ca2-rg' }}
          cluster-name: ${{ vars.AKS_CLUSTER_NAME || 'eadesign-ca2-aks' }}

      - name: Add Helm Repos
        run: |
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Install Prometheus And Grafana
        run: |
          helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
            --namespace eadesign-ca2 \
            --set grafana.adminPassword=${{ secrets.GRAFANA_PASSWORD }} \
            --set prometheus.prometheusSpec.serviceMonitorSelectorNilUsesHelmValues=false \
            --set prometheus.prometheusSpec.podMonitorSelectorNilUsesHelmValues=false \
            --set grafana.sidecar.datasources.enabled=true

      - name: Install Loki Stack
        run: |
          helm upgrade --install loki grafana/loki-stack \
            --namespace eadesign-ca2 \
            --set grafana.enabled=false \
            --set loki.enabled=true \
            --set promtail.enabled=true \
            --set test_pod.enabled=false

      - name: Normalize Grafana Datasources
        run: |
          for resource in $(kubectl get configmap -n eadesign-ca2 -l grafana_datasource -o name); do
            if [ "$resource" != "configmap/monitoring-kube-prometheus-grafana-datasource" ]; then
              kubectl delete "$resource" -n eadesign-ca2
            fi
          done

          for resource in $(kubectl get secret -n eadesign-ca2 -l grafana_datasource -o name); do
            kubectl delete "$resource" -n eadesign-ca2
          done

          cat <<'EOF' | kubectl apply -f -
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: monitoring-kube-prometheus-grafana-datasource
            namespace: eadesign-ca2
            labels:
              grafana_datasource: "1"
              app: kube-prometheus-stack-grafana
              app.kubernetes.io/component: grafana
              app.kubernetes.io/instance: monitoring
              app.kubernetes.io/name: kube-prometheus-stack-grafana
          data:
            datasource.yaml: |-
              apiVersion: 1
              datasources:
                - name: Prometheus
                  type: prometheus
                  uid: prometheus
                  access: proxy
                  url: http://monitoring-kube-prometheus-prometheus.eadesign-ca2:9090/
                  isDefault: true
                  jsonData:
                    httpMethod: POST
                    timeInterval: 30s
                - name: Loki
                  type: loki
                  uid: loki
                  access: proxy
                  url: http://loki.eadesign-ca2:3100
                  isDefault: false
                  jsonData:
                    maxLines: 1000
          EOF

      - name: Restart Grafana
        run: |
          kubectl rollout restart deployment/monitoring-grafana -n eadesign-ca2
          kubectl rollout status deployment/monitoring-grafana -n eadesign-ca2 --timeout=180s

      - name: Apply PodMonitors
        run: |
          cat <<'EOF' | kubectl apply -f -
          apiVersion: monitoring.coreos.com/v1
          kind: PodMonitor
          metadata:
            name: backend-podmonitor
            namespace: eadesign-ca2
            labels:
              release: monitoring
          spec:
            namespaceSelector:
              matchNames:
                - eadesign-ca2
            selector:
              matchLabels:
                app: backend
            podMetricsEndpoints:
              - path: /actuator/prometheus
                targetPort: 8080
                interval: 30s
          ---
          apiVersion: monitoring.coreos.com/v1
          kind: PodMonitor
          metadata:
            name: frontend-podmonitor
            namespace: eadesign-ca2
            labels:
              release: monitoring
          spec:
            namespaceSelector:
              matchNames:
                - eadesign-ca2
            selector:
              matchLabels:
                app: frontend
            podMetricsEndpoints:
              - path: /metrics
                targetPort: 22137
                interval: 30s
          EOF

      - name: Verify Monitoring Pods
        run: kubectl get pods -n eadesign-ca2 -l "release=monitoring"

      - name: Verify Loki Pods
        run: kubectl get pods -n eadesign-ca2 -l "release=loki"

      - name: Show Access Info
        run: |
          echo "===== MONITORING ACCESS ====="
          echo "Grafana (metrics + logs): kubectl port-forward svc/monitoring-grafana 3000:80 -n eadesign-ca2"
          echo "Prometheus:               kubectl port-forward svc/monitoring-kube-prometheus-prometheus 9090:9090 -n eadesign-ca2"
          echo "============================="
