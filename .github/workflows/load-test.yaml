name: Load Test

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Base URL to test
        required: true
        default: http://20.49.254.4
        type: string
      vus:
        description: Number of virtual users
        required: true
        default: "20"
        type: string
      iterations:
        description: Total iterations across all virtual users
        required: true
        default: "6000"
        type: string

jobs:
  k6-load-test:
    name: Run k6 Load Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 Script
        env:
          TARGET_URL: ${{ github.event.inputs.target_url }}
        run: |
          k6 run \
            --vus ${{ github.event.inputs.vus }} \
            --iterations ${{ github.event.inputs.iterations }} \
            --summary-export k6-summary.json \
            load-tests/website.js

      - name: Upload k6 Summary
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary
          path: k6-summary.json
